<script>
  let score = 0;
  let current = 0;

  const questions = [
    { q: "What is Assets = Liabilities + ___ ?", a: "equity" },
    { q: "What is money earned called in accounting?", a: "revenue" },
    { q: "What do you call money owed to others?", a: "liabilities" },
    { q: "What is the formula for profit? (Revenue - ___)", a: "expenses" },
    { q: "What financial statement shows profit over time?", a: "income statement" }
  ];

  function updateProgress() {
    let progress = (current / questions.length) * 100;
    document.getElementById("progressBar").style.width = progress + "%";
  }

  function loadQuestion() {
    document.getElementById("question").innerText = questions[current].q;
    document.getElementById("answer").value = "";
    document.getElementById("feedback").innerText = "";
    updateProgress();
  }

  function checkAnswer() {
    let user = document.getElementById("answer").value.toLowerCase().trim();
    let correct = questions[current].a;

    if (user === correct) {
      document.getElementById("feedback").innerText = "✅ Correct!";
      document.getElementById("feedback").style.color = "#198754";
      score++;
    } else {
      document.getElementById("feedback").innerText = "❌ Incorrect.";
      document.getElementById("feedback").style.color = "#dc3545";
    }

    document.getElementById("score").innerText = "Score: " + score;
  }

  function showAnswer() {
    let correct = questions[current].a;
    document.getElementById("feedback").innerText = "💡 Answer: " + correct;
    document.getElementById("feedback").style.color = "#f39c12";
  }

  function nextQuestion() {
    current++;
    if (current >= questions.length) {
      endGame();
      return;
    }
    loadQuestion();
  }

  function endGame() {
    document.getElementById("question").innerText =
      "🎉 Level Complete! Great Job!";
    
    document.getElementById("answer").style.display = "none";
    document.getElementById("retryBtn").style.display = "inline-block";
    document.getElementById("progressBar").style.width = "100%";
  }

  function restartGame() {
    score = 0;
    current = 0;
    document.getElementById("answer").style.display = "inline-block";
    document.getElementById("retryBtn").style.display = "none";
    document.getElementById("score").innerText = "Score: 0";
    loadQuestion();
  }

  loadQuestion();
</script>
